# Golden path: local dev and CI both use Taskfile tasks (see Taskfile.yml's
# `ci` target) — this workflow exists to invoke them, not to reimplement
# them in YAML.
name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # No `version:` input here — package.json's `packageManager` field
      # already pins pnpm@10.30.3, and the action refuses to start when
      # both are set ("Multiple versions of pnpm specified").
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      # Install separately, with a retry, before `task ci`. A fresh install
      # on these runners has hit a reproducible pnpm bin-linking race twice
      # in a row (ENOTEMPTY during rmdir + ENOENT creating node_modules/.bin/eve)
      # when a peer-dependency-qualified package — eve, resolved once
      # directly and once via @vercel/connect's peer copy — gets linked
      # concurrently from two places in the store. Not reproducible locally
      # (a from-scratch install with an isolated store succeeds every time),
      # so this is runner-environment-specific, not a real dependency bug.
      # `task ci`'s own nested `deps` task (Taskfile.yml) is a no-op once
      # node_modules/.modules.yaml is already up to date, so this doesn't
      # install twice on the happy path.
      - name: Install dependencies (retried — see comment above)
        run: pnpm install --frozen-lockfile || pnpm install --frozen-lockfile

      - run: task ci
