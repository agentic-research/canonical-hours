# Publish @agentic-research/vespers-core to npmjs.org.
#
# Trigger: push a tag `vespers-v<version>` matching
# packages/vespers/package.json. The version check below fails the run on a
# mismatch rather than publishing an artifact whose tag lies about its contents.
name: publish-vespers

on:
  push:
    tags:
      - "vespers-v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # id-token lets npm attach a provenance attestation binding the tarball to
      # this workflow + commit instead of a local machine upload.
      id-token: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # No `version:` input here: package.json's packageManager pins pnpm.
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          registry-url: https://registry.npmjs.org
          scope: "@agentic-research"

      - uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - run: pnpm install --frozen-lockfile

      - run: task typecheck:vespers
      - run: pnpm --filter @agentic-research/vespers-core run build

      - name: Pack smoke
        run: pnpm --filter @agentic-research/vespers-core pack --pack-destination /tmp

      - name: Tag must match package version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#vespers-v}"
          PKG_VERSION="$(node -p "require('./packages/vespers/package.json').version")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "tag $GITHUB_REF_NAME implies $TAG_VERSION but package.json says $PKG_VERSION" >&2
            exit 1
          fi
          echo "version $PKG_VERSION matches tag"

      - name: Publish
        working-directory: packages/vespers
        run: pnpm publish --no-git-checks --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
