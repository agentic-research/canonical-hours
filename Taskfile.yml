version: '3'

# Golden path: local dev and (whenever a workflow is added) CI both use
# these tasks. This repo has no CI workflow yet (see docs/ARCHITECTURE.md,
# "What's verified, and what's not") — this Taskfile exists so that when
# CI lands it wires straight into these same targets rather than
# reinventing them in YAML, matching the convention in cloister/rosary/mache.

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  deps:
    desc: Install dependencies from pnpm-lock.yaml (frozen)
    cmds:
      - CI=true pnpm install --frozen-lockfile
    sources:
      - package.json
      - pnpm-lock.yaml
    generates:
      - node_modules/.modules.yaml

  setup:
    desc: "Fresh-clone bootstrap: prepare pnpm, create .env if missing, install deps, and wire local hooks when possible."
    cmds:
      - |
        if command -v corepack >/dev/null 2>&1; then
          corepack enable
          echo "▸ enabled pnpm via Corepack"
        elif command -v pnpm >/dev/null 2>&1; then
          echo "▸ using existing pnpm at $(command -v pnpm)"
        else
          echo "▸ pnpm is not on PATH and corepack is unavailable. Install pnpm or use a Node build that includes Corepack."
          exit 1
        fi
      - |
        if [ ! -f .env ]; then
          cp .env.example .env
          echo "▸ created .env from .env.example"
        else
          echo "▸ .env already exists; leaving it untouched"
        fi
      - task deps
      - |
        if task install-hooks; then
          echo "▸ local hooks ready"
        else
          echo "▸ hook wiring skipped because an existing non-symlink hook is present; setup can continue"
        fi

  dev:
    desc: Start the eve dev server (schedules never fire on cron in dev — trigger manually, see README)
    deps: [deps]
    cmds:
      - pnpm exec eve dev

  dev:worker:
    desc: "Start the experimental workerd/miniflare-local canonical-hours host (no Eve, no model; /board, /board/md, /mcp get_board + trigger_tick)."
    deps: [deps]
    cmds:
      - pnpm exec wrangler dev --config worker/wrangler.toml --env-file .env --local --port ${PORT:-2000} --persist-to .wrangler/state --log-level warn

  tick:
    desc: "Run one canonical-hours tick from the shell, without starting Eve dev or requiring a model key."
    deps: [deps]
    cmds:
      - pnpm exec tsx scripts/run-tick.ts

  brief:claude:
    desc: "Run one no-model tick, then ask Claude Code CLI to brief board.md using your Claude Code auth/subscription."
    deps: [deps]
    cmds:
      - task tick
      - |
        board="${BOARD_DIR:-board}/board.md"
        if ! command -v claude >/dev/null 2>&1; then
          echo "▸ claude CLI not found on PATH"
          exit 1
        fi
        claude -p "$(printf 'Read this canonical-hours board and give a concise operational brief: what needs attention, what is degraded, and what should happen next.\n\n'; cat "$board")"

  brief:codex:
    desc: "Run one no-model tick, then ask Codex CLI to brief board.md using your Codex auth/subscription."
    deps: [deps]
    cmds:
      - task tick
      - |
        board="${BOARD_DIR:-board}/board.md"
        if ! command -v codex >/dev/null 2>&1; then
          echo "▸ codex CLI not found on PATH"
          exit 1
        fi
        {
          printf 'Read this canonical-hours board and give a concise operational brief: what needs attention, what is degraded, and what should happen next.\n\n'
          cat "$board"
        } | codex exec -C . -

  build:
    desc: Build for deployment (eve build)
    deps: [deps]
    cmds:
      - pnpm exec eve build

  test:
    desc: Run the test suite (vitest)
    deps: [deps]
    cmds:
      - pnpm exec vitest run

  test:watch:
    desc: Watch mode
    deps: [deps]
    cmds:
      - pnpm exec vitest

  test:package:
    desc: "Build @agentic-research/vespers-core and prove its published ESM entrypoint imports under Node."
    deps: [deps]
    cmds:
      - pnpm --filter @agentic-research/vespers-core run test:package

  typecheck:
    desc: TypeScript type check (no emit)
    deps: [deps]
    cmds:
      - pnpm exec tsc --noEmit

  codegen:
    desc: "Regenerate GraphQL zod schemas (agent/lib/sources/generated/*.ts) from canonical-hours.codegen.{github,linear}.ts. Run after editing graphql/sources/*.graphql or bumping a provider schema. Includes a post-process dedup pass — see scripts/dedupe-codegen-enums.mjs's header comment for why it's needed (a confirmed, isolated upstream typescript+typescript-operations limitation, not a config mistake)."
    deps: [deps]
    cmds:
      - pnpm exec graphql-codegen --config canonical-hours.codegen.github.ts
      - pnpm exec graphql-codegen --config canonical-hours.codegen.linear.ts
      - node scripts/dedupe-codegen-enums.mjs agent/lib/sources/generated/github-types.ts
      - node scripts/dedupe-codegen-enums.mjs agent/lib/sources/generated/linear-types.ts
      - node scripts/fix-codegen-enum-default-casing.mjs agent/lib/sources/generated/github.ts
      - node scripts/fix-codegen-enum-default-casing.mjs agent/lib/sources/generated/linear.ts

  typecheck:vespers:
    desc: "TypeScript type check for packages/vespers under its own workers-typed tsconfig (no 'node' types) — the mechanical guardrail against an accidental Node-only import in the portable engine."
    deps: [deps]
    cmds:
      - pnpm exec tsc --noEmit -p packages/vespers/tsconfig.json

  typecheck:worker:
    desc: "TypeScript type check for the workerd/miniflare canonical-hours host."
    deps: [deps]
    cmds:
      - pnpm exec tsc --noEmit -p worker/tsconfig.json

  test:workerd:
    desc: "Live @cloudflare/vitest-pool-workers smoke test proving @agentic-research/vespers-core runs under a simulated workerd runtime (canonical-hours-35893f) — not part of task check/ci yet: it spins up Miniflare and is slower/heavier than the rest of the suite. Run explicitly when touching packages/vespers."
    dir: packages/vespers
    cmds:
      - pnpm exec vitest run --config vitest.workerd.config.mts

  test:worker:
    desc: "Live Miniflare smoke for the canonical-hours Worker host: /board and MCP trigger_tick without Eve or a model provider."
    deps: [deps]
    cmds:
      - pnpm exec vitest run --config worker/vitest.config.mts

  smells:
    desc: "Structural smell gate — fail only on findings beyond docs/smell-baseline.json (see docs/smell-gate.md). --tags=gate matches mache's own ratchet convention (the composite GitHub Action hardcodes the same selection) and excludes the min-0 firehose rules (cyclomatic_complexity, magic_int_in_comparison) that fire noise on every file rather than genuine structural debt. Requires the mache CLI."
    cmds:
      - mache build . smells.db
      - mache find-smells --db smells.db --rule '*' --tags=gate --limit 100000 --baseline-root "$PWD" --baseline docs/smell-baseline.json

  smells:baseline:
    desc: "Regenerate docs/smell-baseline.json from the current scan (same --tags=gate selection as `task smells`). Deliberate re-grandfathering only (e.g. after an accepted refactor) — day-to-day use `task smells`. In a tree with any OTHER concurrent, unrelated unstaged/untracked WIP present, prefer `task smells:baseline:safe` instead — this target scans the real working tree as-is, WIP included (canonical-hours-4ba370)."
    cmds:
      - mache build . smells.db
      - mache find-smells --db smells.db --rule '*' --tags=gate --limit 100000 --baseline-root "$PWD" --write-baseline docs/smell-baseline.json

  smells:baseline:safe:
    desc: "Like `smells:baseline`, but isolated from any concurrent unrelated WIP elsewhere in the working tree (canonical-hours-4ba370) — regenerates against the STAGED tree only, via the same git checkout-index isolation the pre-commit hook uses. Prefer this over `smells:baseline` whenever another process might have unstaged/untracked changes on disk."
    cmds:
      - scripts/smells-baseline-safe

  check:
    desc: "Fast gate — typecheck + package smoke + Node tests + Worker smoke. Run this before commit/push, and (once a CI workflow exists) in CI."
    deps: [deps]
    cmds:
      - task typecheck
      - task typecheck:vespers
      - task typecheck:worker
      - task test:package
      - task test
      - task test:worker

  ci:
    desc: "The exact gate CI runs (.github/workflows/ci.yml): typecheck + package smoke + test. The smell gate runs as its own workflow (.github/workflows/smells.yml, via mache's composite action) rather than through this task — see docs/smell-gate.md."
    cmds:
      - task: check

  sync-server-json-version:
    desc: "Update server.json's version to match package.json's, via a surgical string replacement (canonical-hours-5d74fc) — run this after bumping the package version. test/server-json.test.ts still catches drift if you forget."
    cmds:
      - node scripts/sync-server-json-version.mjs

  install-hooks:
    desc: "Symlink scripts/git-hooks/* into .git/hooks/. Run once per clone so the smell gate (task smells) fires automatically before every commit."
    cmds:
      - |
        set -e
        HOOK_DIR="$(git rev-parse --git-dir)/hooks"
        for hook in scripts/git-hooks/*; do
          name="$(basename "$hook")"
          target="$HOOK_DIR/$name"
          if [ -e "$target" ] && [ ! -L "$target" ]; then
            echo "▸ $target exists and is NOT a symlink — back it up + re-run, or move aside manually."
            exit 1
          fi
          ln -sf "$(pwd)/$hook" "$target"
          echo "▸ wired $target -> $hook"
        done
